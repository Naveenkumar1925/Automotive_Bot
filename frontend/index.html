<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Chatbot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="chat-header">
      <div class="avatar bot-avatar">AI</div>
      <div class="header-text">
        <h1>AUTOBOT</h1>
        <span class="status"><span class="dot"></span> Online</span>
      </div>
    </header>

    <main id="messages" class="messages" aria-live="polite"></main>

    <footer class="chat-input">
      <form id="chat-form">
        <input
          type="text"
          id="message"
          placeholder="Type a message..."
          autocomplete="off"
          required
        />
        <button type="submit" id="send-btn" aria-label="Send">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
            <path d="M3.4 20.4l17.45-7.48a1 1 0 000-1.84L3.4 3.6a1 1 0 00-1.39 1.18L4 11l9 1-9 1-1.99 6.22a1 1 0 001.39 1.18z"/>
          </svg>
        </button>
      </form>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
